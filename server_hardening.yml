---
# =============================================================================
# Server Hardening Playbook
# Covers: SSH hardening, sudo/su restrictions, Diffie-Hellman cleanup,
#         NTP verification, and unattended security upgrades
#
# Usage:
#   ansible-playbook server_hardening.yml -i inventory.ini \
#     -e "ssh_users=user1,user2 sudo_users=user1 su_users=user1"
#
# Variables (set in vars section below or pass via -e):
#   ssh_users   - comma-separated list of users allowed to SSH
#   sudo_users  - comma-separated list of users allowed to use sudo
#   su_users    - comma-separated list of users allowed to use su
# =============================================================================

- name: Server Hardening
  hosts: all
  become: true
  gather_facts: true

  vars:
    ssh_users: ["ubuntu"]        # e.g. ["user1", "user2"]
    sudo_users: ["ubuntu"]       # e.g. ["user1"]
    su_users: ["ubuntu"]         # e.g. ["user1"]
    alert_email: "root"  # Email for apticron / unattended-upgrade alerts

  # ---------------------------------------------------------------------------
  # PRE-TASKS: sanity checks
  # ---------------------------------------------------------------------------
  pre_tasks:
    - name: Assert target OS is Debian/Ubuntu
      assert:
        that: ansible_os_family == "Debian"
        fail_msg: "This playbook is designed for Debian/Ubuntu systems only."

    # Accept either a real list (vars block / JSON -e) OR a comma-separated
    # string (e.g. -e "ssh_users=alice,bob"). Plain `-e key=value` always
    # arrives as a string, so normalize to a list before the loops below.
    #
    # NOTE: we MUST write to new variable names here. Extra vars (-e) have the
    # highest precedence in Ansible, so a set_fact onto ssh_users itself would
    # be silently ignored and the loops would still see the raw string.
    - name: Normalize user lists
      set_fact:
        ssh_users_list: "{{ ssh_users.split(',') | map('trim') | reject('equalto', '') | list if ssh_users is string else ssh_users }}"
        sudo_users_list: "{{ sudo_users.split(',') | map('trim') | reject('equalto', '') | list if sudo_users is string else sudo_users }}"
        su_users_list: "{{ su_users.split(',') | map('trim') | reject('equalto', '') | list if su_users is string else su_users }}"

  # ---------------------------------------------------------------------------
  # TASKS
  # ---------------------------------------------------------------------------
  tasks:

    # =========================================================================
    # 1. SSH GROUP
    # =========================================================================
    - name: Create sshusers group
      group:
        name: sshusers
        state: present

    - name: Add users to sshusers group
      user:
        name: "{{ item }}"
        groups: sshusers
        append: true
      loop: "{{ ssh_users_list }}"
      when: ssh_users_list | length > 0

    # =========================================================================
    # 2. BACKUP & HARDEN /etc/ssh/sshd_config
    # =========================================================================
    - name: Backup sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: "/etc/ssh/sshd_config-COPY-{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        owner: root
        group: root
        mode: "0600"

    - name: Apply hardened sshd_config
      template:
        src: templates/sshd_config.j2
        dest: /etc/ssh/sshd_config
        owner: root
        group: root
        mode: "0644"
        # validate aborts (and leaves the old file in place) if the rendered
        # config is invalid, so a bad template can never lock us out.
        validate: "sshd -t -f %s"
      notify: Restart SSH service

    - name: Validate sshd_config syntax
      command: sshd -t
      changed_when: false

    - name: Ensure SSH service is enabled and running
      service:
        # Debian/Ubuntu use ssh.service; fall back to sshd elsewhere.
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: started
        enabled: true

    # =========================================================================
    # 3. REMOVE SHORT DIFFIE-HELLMAN KEYS (< 3072 bits)
    # =========================================================================
    - name: Backup /etc/ssh/moduli
      copy:
        src: /etc/ssh/moduli
        dest: "/etc/ssh/moduli-COPY-{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: Filter out short DH moduli (keep >= 3072 bits)
      shell: |
        before=$(wc -l < /etc/ssh/moduli)
        awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.tmp \
          && mv /etc/ssh/moduli.tmp /etc/ssh/moduli
        after=$(wc -l < /etc/ssh/moduli)
        echo "removed=$((before - after))"
      args:
        executable: /bin/bash
      register: moduli_filter
      changed_when: "'removed=0' not in moduli_filter.stdout"

    # =========================================================================
    # 4. LIMIT SUDO ACCESS
    # =========================================================================
    - name: Check current sudo group membership
      command: grep sudo /etc/group
      register: sudo_group_check
      changed_when: false
      failed_when: false

    - name: Show current sudo group members
      debug:
        msg: "{{ sudo_group_check.stdout }}"

    - name: Create sudousers group
      group:
        name: sudousers
        state: present

    - name: Add users to sudousers group
      user:
        name: "{{ item }}"
        groups: sudousers
        append: true
      loop: "{{ sudo_users_list }}"
      when: sudo_users_list | length > 0

    - name: Backup /etc/sudoers
      copy:
        src: /etc/sudoers
        dest: "/etc/sudoers-COPY-{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        owner: root
        group: root
        mode: "0440"

    - name: Grant sudousers group full sudo access
      lineinfile:
        path: /etc/sudoers
        # Password required — do NOT use NOPASSWD here. A passwordless rule
        # would let any compromised sudousers shell escalate to root instantly.
        line: "%sudousers   ALL=(ALL:ALL) ALL"
        validate: "visudo -cf %s"
        state: present

    # =========================================================================
    # 5. LIMIT SU ACCESS
    # =========================================================================
    - name: Create suusers group
      group:
        name: suusers
        state: present

    - name: Add users to suusers group
      user:
        name: "{{ item }}"
        groups: suusers
        append: true
      loop: "{{ su_users_list }}"
      when: su_users_list | length > 0

    - name: Restrict /bin/su to suusers group (setuid 4750)
      command: dpkg-statoverride --update --add root suusers 4750 /bin/su
      register: su_override
      # dpkg-statoverride --add returns exit code 2 BOTH when the override
      # already exists and on a genuine error (exit 1 is only used by --list).
      # So we can't tell them apart by rc; discriminate on the message instead:
      # tolerate "already exists" (idempotent re-run), fail on anything else.
      failed_when: su_override.rc != 0 and 'already exists' not in su_override.stderr
      changed_when: su_override.rc == 0

    # =========================================================================
    # 6. VERIFY NTP IS RUNNING
    # =========================================================================
    - name: Check timedatectl status
      command: timedatectl
      register: timedatectl_status
      changed_when: false

    - name: Show timedatectl output
      debug:
        msg: "{{ timedatectl_status.stdout_lines }}"

    - name: Ensure systemd-timesyncd is installed
      apt:
        name: systemd-timesyncd
        state: present

    - name: Configure systemd-timesyncd NTP servers
      copy:
        dest: /etc/systemd/timesyncd.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # {{ ansible_managed }}
          [Time]
          NTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
          FallbackNTP=ntp.ubuntu.com
      notify: Restart systemd-timesyncd

    - name: Enable NTP synchronization
      command: timedatectl set-ntp true
      changed_when: false

    - name: Ensure systemd-timesyncd is enabled and running
      service:
        name: systemd-timesyncd
        state: started
        enabled: true

    # =========================================================================
    # 7. AUTOMATIC SECURITY UPDATES (unattended-upgrades + apticron)
    # =========================================================================
    - name: Install unattended-upgrades, apt-listchanges, apticron
      apt:
        name:
          - unattended-upgrades
          - apt-listchanges
          - apticron
        state: present
        update_cache: true

    - name: Enable unattended-upgrades via debconf
      debconf:
        name: unattended-upgrades
        question: unattended-upgrades/enable_auto_updates
        value: "true"
        vtype: boolean

    - name: Deploy custom unattended-upgrades config
      copy:
        dest: /etc/apt/apt.conf.d/51myunattended-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          // Enable the update/upgrade script (0=disable)
          APT::Periodic::Enable "1";

          // Do "apt-get update" automatically every n-days (0=disable)
          APT::Periodic::Update-Package-Lists "1";

          // Do "apt-get upgrade --download-only" every n-days (0=disable)
          APT::Periodic::Download-Upgradeable-Packages "1";

          // Do "apt-get autoclean" every n-days (0=disable)
          APT::Periodic::AutocleanInterval "7";

          APT::Periodic::Verbose "2";
          APT::Periodic::Unattended-Upgrade "1";

          Unattended-Upgrade::Origins-Pattern {
          {% if ansible_distribution == 'Ubuntu' %}
              "origin=Ubuntu,codename=${distro_codename},label=Ubuntu";
              "origin=Ubuntu,codename=${distro_codename},label=Ubuntu-Security";
              "origin=UbuntuESMApps,codename=${distro_codename},label=Ubuntu-Apps-Security";
              "origin=UbuntuESM,codename=${distro_codename},label=Ubuntu-Infra-Security";
          {% else %}
              "origin=Debian,codename=${distro_codename},label=Debian";
              "origin=Debian,codename=${distro_codename},label=Debian-Security";
              "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
          {% endif %}
          };

          Unattended-Upgrade::Package-Blacklist {
          };

          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::InstallOnShutdown "false";
          Unattended-Upgrade::Mail "{{ alert_email }}";
          Unattended-Upgrade::MailOnlyOnError "false";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Remove-New-Unused-Dependencies "true";

          // Safe for servers — no automatic reboots
          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Automatic-Reboot-WithUsers "false";

    # NOTE: We intentionally leave the distro-provided 50unattended-upgrades in
    # place. Our 51myunattended-upgrades sorts after it, so its scalar settings
    # win, and APT *appends* Origins-Pattern list entries across files — so on
    # Debian the distro file's correct origins stay active. Renaming the distro
    # file would mean package updates can't manage it and could silently
    # reintroduce it on upgrade.

    - name: Dry-run unattended-upgrades to validate config
      command: unattended-upgrades --dry-run --debug
      register: dry_run_result
      changed_when: false

    - name: Show dry-run output
      debug:
        msg: "{{ dry_run_result.stdout_lines[-20:] }}"  # last 20 lines

  # ---------------------------------------------------------------------------
  # HANDLERS
  # ---------------------------------------------------------------------------
  handlers:
    - name: Restart SSH service
      service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted

    - name: Restart systemd-timesyncd
      service:
        name: systemd-timesyncd
        state: restarted
